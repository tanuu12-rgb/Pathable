kind = "web"
previewPath = "/"
title = "PathAble"
version = "1.0.0"
id = "artifacts/pathable"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26072

[services.development]
run = "pnpm --filter @workspace/pathable run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pathable", "run", "build" ]
publicDir = "artifacts/pathable/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26072"
BASE_PATH = "/"
